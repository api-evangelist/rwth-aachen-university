      did not resolve to automated probes during review, so it is cataloged from
      documentation rather than a live 200. The IT Center operates a documented
      OAuth2/OpenID Connect and Shibboleth/SAML2 Single Sign-On for application
      authorization. No single unified RWTH developer portal exists; the RWTHapp
      mobile backend is SSO-gated with no public API, so it was not cataloged. No
      endpoints were fabricated; gated and unresolved items are noted honestly.
